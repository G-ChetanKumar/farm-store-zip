      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook received
  /api/v1/coupons:
    post:
      tags: [Coupons]
      summary: Create coupon (Admin only)
      security:
        - adminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, discount_type, value, expires_at]
              properties:
                code:
                  type: string
                  description: Coupon code (will be uppercased)
                user_id:
                  type: string
                  description: Optional user ID (coupon specific to user)
                discount_type:
                  type: string
                  enum: [flat, percent]
                value:
                  type: number
                  description: Discount amount (flat) or percentage
                min_order:
                  type: number
                  description: Minimum order amount required
                expires_at:
                  type: string
                  format: date-time
                usage_limit:
                  type: number
                  description: Maximum number of times coupon can be used
      responses:
        "201":
          description: Coupon created
        "400":
          description: Invalid input
        "500":
          description: Server error
  /api/v1/coupons/admin/all:
    get:
      tags: [Coupons]
      summary: Get all coupons (Admin only)
      security:
        - adminBearerAuth: []
      responses:
        "200":
          description: All coupons with populated user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        "500":
          description: Server error
  /api/v1/coupons/admin/stats:
    get:
      tags: [Coupons]
      summary: Get coupon statistics (Admin only)
      security:
        - adminBearerAuth: []
      responses:
        "200":
          description: Coupon statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalCoupons:
                        type: number
                      activeCoupons:
                        type: number
                      expiredCoupons:
                        type: number
                      validCoupons:
                        type: number
        "500":
          description: Server error
  /api/v1/coupons/{id}:
    put:
      tags: [Coupons]
      summary: Update coupon (Admin only)
      security:
        - adminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Coupon ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                discount_type:
                  type: string
                  enum: [flat, percent]
                value:
                  type: number
                min_order:
                  type: number
                expires_at:
                  type: string
                  format: date-time
                usage_limit:
                  type: number
                is_active:
                  type: boolean
      responses:
        "200":
          description: Coupon updated
        "404":
          description: Coupon not found
        "500":
          description: Server error
    delete:
      tags: [Coupons]
      summary: Delete coupon (Admin only)
      security:
        - adminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Coupon ID
      responses:
        "200":
          description: Coupon deleted
        "404":
          description: Coupon not found
        "500":
          description: Server error
  /api/v1/coupons/{id}/toggle:
    patch:
      tags: [Coupons]
      summary: Toggle coupon active status (Admin only)
      security:
        - adminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Coupon ID
      responses:
        "200":
          description: Coupon status toggled
        "404":
          description: Coupon not found
        "500":
          description: Server error
