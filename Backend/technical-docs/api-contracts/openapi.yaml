        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID to get coupons for
      responses:
        "200":
          description: Coupons available for user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        "500":
          description: Server error
  /api/v1/coupons/apply:
    post:
      tags: [Coupons]
      summary: Apply coupon to calculate discount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, user_id, order_total]
              properties:
                code:
                  type: string
                  description: Coupon code to apply
                user_id:
                  type: string
                  description: User ID applying the coupon
                order_total:
                  type: number
                  description: Order total before discount
      responses:
        "200":
          description: Coupon applied successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      discount:
                        type: number
                      new_total:
                        type: number
        "400":
          description: Invalid coupon (expired, limit reached, below min order)
        "403":
          description: Coupon not valid for this user
        "404":
          description: Coupon not found
        "500":
          description: Server error
